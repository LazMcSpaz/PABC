<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <g transform="translate(256 256)">
    <!-- hex sigil (vertical-pointy) -->
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"
      fill="none" stroke="#f5d06f" stroke-width="14" stroke-linejoin="round"/>
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
      fill="#f5d06f" opacity="0.08"/>
    <!-- AC monogram -->
    <text x="0" y="36" font-family="Inter, system-ui, sans-serif"
      font-size="180" font-weight="800" text-anchor="middle"
      fill="#f5d06f" letter-spacing="-6">AC</text>
  </g>
</svg>
